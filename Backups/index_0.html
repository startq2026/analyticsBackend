<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarQ Distributor Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #333; }
        .controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; align-items: center; }
        input[type="date"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background-color 0.3s;}
        button:hover:not(:disabled) { background-color: #0056b3; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        .chart-container { position: relative; height: 400px; width: 100%; margin-bottom: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h1>StarQ Data Analysis</h1>
    
    <div class="controls">
        <label>Start Date: <input type="date" id="startDate" required></label>
        <label>End Date: <input type="date" id="endDate" required></label>
        <button id="generateBtn" onclick="fetchData()">Generate Charts</button>
    </div>

    <h2>Total Revenue per Distributor (Collection)</h2>
    <div class="chart-container">
        <canvas id="revenueChart"></canvas>
    </div>

    <div id="booksChartsContainer">
        </div>
</div>

<script>
    let revenueChartInstance = null;
    let bookChartInstances = [];

    async function fetchData() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const generateBtn = document.getElementById('generateBtn');

        // 1. Validation: Guarantee dates are entered
        if (!startDate || !endDate) {
            alert("Please select both a Start Date and an End Date before generating charts.");
            return;
        }

        // 2. Prevent Multiple Requests: Disable the button and change text
        generateBtn.disabled = true;
        generateBtn.innerText = "Generating...";

        // Fetch data from the Python Backend
        let url = `http://127.0.0.1:5000/api/analysis?start_date=${startDate}&end_date=${endDate}`;

        try {
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            renderRevenueChart(data.revenues);
            renderBooksCharts(data.books_sold);
        } catch (error) {
            console.error("Error fetching data:", error);
            alert("Failed to fetch data. Ensure the Python backend is running and dates are valid.");
        } finally {
            // 3. Re-enable the button regardless of success or failure
            generateBtn.disabled = false;
            generateBtn.innerText = "Generate Charts";
        }
    }

    function renderRevenueChart(revenues) {
        const ctx = document.getElementById('revenueChart').getContext('2d');
        const labels = Object.keys(revenues);
        const values = Object.values(revenues);

        if (revenueChartInstance) revenueChartInstance.destroy();

        revenueChartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Revenue (₹)',
                    data: values,
                    backgroundColor: 'rgba(54, 162, 235, 0.6)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true } }
            }
        });
    }

    function renderBooksCharts(booksSoldData) {
        const container = document.getElementById('booksChartsContainer');
        container.innerHTML = ''; 
        
        bookChartInstances.forEach(chart => chart.destroy());
        bookChartInstances = [];

        for (const [distributor, books] of Object.entries(booksSoldData)) {
            const labels = Object.keys(books);
            const values = Object.values(books);

            if (labels.length === 0) continue; 

            const title = document.createElement('h2');
            title.innerText = `Books Sold: ${distributor}`;
            container.appendChild(title);

            const chartDiv = document.createElement('div');
            chartDiv.className = 'chart-container';
            const canvas = document.createElement('canvas');
            chartDiv.appendChild(canvas);
            container.appendChild(chartDiv);

            const chartInstance = new Chart(canvas.getContext('2d'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Net Copies Sold',
                        data: values,
                        backgroundColor: 'rgba(255, 159, 64, 0.6)',
                        borderColor: 'rgba(255, 159, 64, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } }
                }
            });

            bookChartInstances.push(chartInstance);
        }
    }
</script>

</body>
</html>
